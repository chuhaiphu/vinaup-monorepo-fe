name: Deploy Jenahair to VPS

on:
  push:
    tags:
      - 'jenahair/v*.*.*' # Only active with prefix jenahair/

env:
  DOCKER_IMAGE: ${{ vars.JENAHAIR_DOCKER_IMAGE }}
  DOCKER_CONTAINER_NAME: jenahair.com-fe
  API_URL: ${{ vars.JENAHAIR_API_URL }}
  NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.JENAHAIR_RECAPTCHA_SITE_KEY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # Strip 'jenahair/' to get version number
          TAG_NAME=${{ github.ref_name }}
          echo "VERSION=${TAG_NAME#*/}" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/jenahair/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            API_URL=${{ env.API_URL }}
            # NEXT_PUBLIC only need at build time
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ env.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            # Pull the new image
            docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}

            # Stop and remove existing container
            docker stop ${{ env.DOCKER_CONTAINER_NAME }} || true
            docker rm ${{ env.DOCKER_CONTAINER_NAME }} || true

            # Run new container with version environment variable
            docker run -d \
              --name ${{ env.DOCKER_CONTAINER_NAME }} \
              --network vinaup-network \
              --restart unless-stopped \
              -e VERSION=${{ steps.version.outputs.VERSION }} \
              -e API_URL=${{ env.API_URL }} \
              ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.VERSION }}

            # Clean up old images (keep latest 3 versions)
            docker images ${{ env.DOCKER_IMAGE }} --format "table {{.Tag}}\t{{.ID}}" | tail -n +4 | awk '{print $2}' | xargs -r docker rmi || true
